name: Build & Deploy (CodeDeploy Blue/Green)

# ─────────────────────────────────────────────────────────────────────────────
# Triggered on push to main (or a release tag).
# Steps:
#   1. Build Docker image and push to ECR
#   2. Register a new ECS task definition revision
#   3. Generate appspec.json with the new task def ARN
#   4. Create a CodeDeploy deployment → triggers blue/green on ECS
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
    paths:
      - "expense-tracker/**"
      - ".github/workflows/deploy.yml"

env:
  AWS_REGION:        ap-south-1
  ECR_REPOSITORY:    expense-tracker
  ECS_CLUSTER:       expense-tracker-dev-cluster
  ECS_SERVICE:       expense-tracker-dev-service
  TASK_DEF_FAMILY:   expense-tracker-dev-app
  CONTAINER_NAME:    expense-tracker-dev-app
  CODEDEPLOY_APP:    expense-tracker-dev-app
  CODEDEPLOY_GROUP:  expense-tracker-dev-deployment-group

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build, Push, Deploy
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Configure AWS credentials via Access Keys ─────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── Login to ECR ───────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & push Docker image ─────────────────────────────────────────
      - name: Build, tag, and push image to ECR
        id: build-image
        working-directory: expense-tracker
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                       -t $ECR_REGISTRY/$ECR_REPOSITORY:stable \
                       -f backend/Dockerfile backend/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:stable
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ── Download current task definition ──────────────────────────────────
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $TASK_DEF_FAMILY \
            --query taskDefinition \
            > task-definition.json

      # ── Inject new image into task definition ─────────────────────────────
      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ steps.build-image.outputs.image }}

      # ── Register new task definition revision ─────────────────────────────
      - name: Register new task definition
        id: register-task-def
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://${{ steps.task-def.outputs.task-definition }} \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task_def_arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT

      # ── Build appspec.json for CodeDeploy ─────────────────────────────────
      - name: Generate appspec.json
        env:
          TASK_DEF_ARN: ${{ steps.register-task-def.outputs.task_def_arn }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess

          def aws_json(query):
              r = subprocess.run(
                  ['aws', 'ecs', 'describe-services',
                   '--cluster', os.environ['ECS_CLUSTER'],
                   '--services', os.environ['ECS_SERVICE'],
                   '--query', query, '--output', 'json'],
                  capture_output=True, text=True, check=True)
              return json.loads(r.stdout)

          appspec = {
              "version": 0.0,
              "Resources": [{
                  "TargetService": {
                      "Type": "AWS::ECS::Service",
                      "Properties": {
                          "TaskDefinition": os.environ['TASK_DEF_ARN'],
                          "LoadBalancerInfo": {
                              "ContainerName": os.environ['CONTAINER_NAME'],
                              "ContainerPort": 8000
                          },
                          "PlatformVersion": "LATEST",
                          "NetworkConfiguration": {
                              "AwsvpcConfiguration": {
                                  "Subnets": aws_json('services[0].networkConfiguration.awsvpcConfiguration.subnets'),
                                  "SecurityGroups": aws_json('services[0].networkConfiguration.awsvpcConfiguration.securityGroups'),
                                  "AssignPublicIp": "DISABLED"
                              }
                          }
                      }
                  }
              }]
          }

          with open('appspec.json', 'w') as f:
              json.dump(appspec, f, indent=2)
          print("Generated appspec.json")
          PYEOF

      # ── Create CodeDeploy deployment ──────────────────────────────────────
      - name: Create CodeDeploy deployment
        id: codedeploy
        run: |
          python3 -c "
          import json
          with open('appspec.json') as f:
              content = f.read()
          revision = {'revisionType': 'AppSpecContent', 'appSpecContent': {'content': content}}
          with open('revision.json', 'w') as f:
              json.dump(revision, f)
          "
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name $CODEDEPLOY_APP \
            --deployment-group-name $CODEDEPLOY_GROUP \
            --revision file://revision.json \
            --description "Deploy ${{ github.sha }} via GitHub Actions" \
            --query 'deploymentId' \
            --output text)
          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          echo "Created deployment: $DEPLOYMENT_ID"

      # ── Wait for deployment to complete ───────────────────────────────────
      - name: Wait for deployment
        run: |
          aws deploy wait deployment-successful \
            --deployment-id ${{ steps.codedeploy.outputs.deployment_id }}
          echo "Deployment ${{ steps.codedeploy.outputs.deployment_id }} succeeded."
